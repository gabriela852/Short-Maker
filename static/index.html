<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Shorts Maker</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
  :root {
    --navy: #0f1b33;
    --gold: #c9a24b;
    --bg: #f6f5f2;
    --card: #ffffff;
    --text: #1c1c1c;
    --muted: #6b6b6b;
  }
  * { box-sizing: border-box; }
  body {
    font-family: -apple-system, "Segoe UI", Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
    margin: 0;
    padding: 32px 16px 80px;
  }
  .wrap { max-width: 720px; margin: 0 auto; }
  h1 { color: var(--navy); font-size: 28px; margin-bottom: 4px; }
  .sub { color: var(--muted); margin-top: 0; margin-bottom: 24px; }
  .card {
    background: var(--card);
    border-radius: 12px;
    padding: 20px;
    margin-bottom: 20px;
    box-shadow: 0 1px 4px rgba(0,0,0,0.08);
  }
  label { display: block; font-weight: 600; margin-bottom: 6px; font-size: 14px; }
  input[type=text], input[type=password] {
    width: 100%;
    padding: 10px 12px;
    border: 1px solid #ddd;
    border-radius: 8px;
    font-size: 14px;
  }
  button {
    background: var(--navy);
    color: white;
    border: none;
    padding: 10px 18px;
    border-radius: 8px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    margin-top: 10px;
  }
  button:hover { opacity: 0.9; }
  button:disabled { opacity: 0.5; cursor: not-allowed; }
  button.secondary { background: var(--gold); color: var(--navy); }
  .row { display: flex; gap: 10px; align-items: flex-end; }
  .row input { flex: 1; }
  .hint { font-size: 13px; color: var(--muted); margin-top: 6px; }
  .status { font-size: 14px; color: var(--navy); margin-top: 10px; }
  .candidate {
    border: 1px solid #eee;
    border-radius: 10px;
    padding: 14px;
    margin-top: 12px;
  }
  .candidate h3 { margin: 0 0 6px; font-size: 16px; color: var(--navy); }
  .candidate .time { font-size: 13px; color: var(--gold); font-weight: 600; }
  .candidate p { font-size: 14px; color: var(--muted); margin: 8px 0; }
  h2.section-heading { font-size: 16px; color: var(--navy); margin: 28px 0 6px; }
  .video-title { font-size: 13px; color: var(--muted); margin: 0 0 4px; font-weight: 600; }
  .preview-hint { font-size: 12px; color: var(--muted); margin: 6px 0 0; }
  .generated-card .meta { font-size: 13px; color: var(--muted); margin: 2px 0; }
  #settingsBox.saved { display: none; }
  #settingsSaved { display: none; font-size: 13px; color: var(--muted); }
  #settingsSaved.show { display: block; }
  video { width: 100%; max-width: 300px; border-radius: 10px; display: block; margin: 12px 0; }
  a.download { display: inline-block; margin-top: 6px; }
  .error { color: #b00020; font-size: 14px; margin-top: 10px; }
  .preview-wrap { max-width: 220px; margin-top: 10px; }
  .preview-wrap img {
    width: 100%;
    border-radius: 10px;
    display: block;
    background: #eee;
    aspect-ratio: 9 / 16;
    object-fit: cover;
    transition: opacity 0.15s;
  }
  .adjust { margin-top: 12px; max-width: 260px; }
  .adjust label { font-weight: 600; font-size: 12px; color: var(--muted); margin-bottom: 2px; }
  .adjust .slider-labels { display: flex; justify-content: space-between; font-size: 11px; color: var(--muted); }
  .adjust input[type=range] { width: 100%; margin: 2px 0 10px; }
  .spinner {
    border: 3px solid #eee;
    border-top: 3px solid var(--navy);
    border-radius: 50%;
    width: 18px; height: 18px;
    display: inline-block;
    animation: spin 0.8s linear infinite;
    vertical-align: middle;
    margin-right: 8px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
<div class="wrap">
  <h1>Shorts Maker</h1>
  <p class="sub">Paste a link to one of your own YouTube videos. It finds the most engaging moment and turns it into a vertical, captioned short.</p>

  <div class="card" id="settingsBox">
    <label for="apiKey">Anthropic API key (used to find the best moment)</label>
    <div class="row">
      <input type="password" id="apiKey" placeholder="sk-ant-...">
      <button onclick="saveKey()">Save</button>
    </div>
    <p class="hint">One-time setup. Your key is saved only on this computer, in this folder's .env file.</p>
  </div>
  <p id="settingsSaved">API key saved. <a href="#" onclick="showSettings(); return false;">Change it</a></p>

  <div class="card">
    <label for="url">YouTube link</label>
    <div class="row">
      <input type="text" id="url" placeholder="https://www.youtube.com/watch?v=...">
      <button id="analyzeBtn" onclick="analyze()">Find the best moment</button>
    </div>
    <div id="analyzeStatus"></div>
  </div>

  <h2 class="section-heading" id="analyzedHeading" style="display:none">Videos you've analyzed</h2>
  <div id="analyzedList"></div>

  <h2 class="section-heading" id="generatedHeading" style="display:none">Shorts you've made</h2>
  <div id="generatedList"></div>
</div>

<script>
let state = {};  // state[`${video_id}-${i}`] = {video_id, video_title, candidate_title, reason, start, end, crop_x_pct, caption_margin_v}
let debounceTimers = {};
let justAnalyzedVideoId = null;

async function refreshSettingsState() {
  const res = await fetch('/api/settings');
  const data = await res.json();
  if (data.has_key) {
    document.getElementById('settingsBox').classList.add('saved');
    document.getElementById('settingsSaved').classList.add('show');
  } else {
    document.getElementById('settingsBox').classList.remove('saved');
    document.getElementById('settingsSaved').classList.remove('show');
  }
}

function showSettings() {
  document.getElementById('settingsBox').classList.remove('saved');
  document.getElementById('settingsSaved').classList.remove('show');
}

async function saveKey() {
  const key = document.getElementById('apiKey').value.trim();
  const res = await fetch('/api/settings', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({api_key: key})
  });
  const data = await res.json();
  if (data.error) { alert(data.error); return; }
  document.getElementById('apiKey').value = '';
  refreshSettingsState();
}

function formatTime(s) {
  const m = Math.floor(s / 60);
  const sec = Math.floor(s % 60);
  return m + ':' + String(sec).padStart(2, '0');
}

async function analyze() {
  const url = document.getElementById('url').value.trim();
  const statusEl = document.getElementById('analyzeStatus');
  const btn = document.getElementById('analyzeBtn');
  if (!url) { statusEl.innerHTML = '<p class="error">Paste a YouTube link first.</p>'; return; }

  btn.disabled = true;
  statusEl.innerHTML = '<p class="status"><span class="spinner"></span>Downloading and reading the video - this can take a minute or two...</p>';

  try {
    const res = await fetch('/api/analyze', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({url})
    });
    const data = await res.json();
    if (data.error) {
      statusEl.innerHTML = '<p class="error">' + data.error + '</p>';
      return;
    }
    statusEl.innerHTML = '<p class="status">Found ' + data.candidates.length + ' candidate moments in "' + data.title + '".</p>';
    justAnalyzedVideoId = data.video_id;
    document.getElementById('url').value = '';
    await loadHistory();
  } catch (e) {
    statusEl.innerHTML = '<p class="error">Something went wrong: ' + e + '</p>';
  } finally {
    btn.disabled = false;
  }
}

async function loadHistory() {
  const res = await fetch('/api/history');
  const data = await res.json();

  state = {};
  const analyzedList = document.getElementById('analyzedList');
  const generatedList = document.getElementById('generatedList');
  analyzedList.innerHTML = '';
  generatedList.innerHTML = '';

  document.getElementById('analyzedHeading').style.display = data.analyses.length ? '' : 'none';
  document.getElementById('generatedHeading').style.display = data.generated.length ? '' : 'none';

  data.analyses.forEach(entry => renderAnalysisEntry(entry, analyzedList));
  data.generated.forEach(g => renderGeneratedEntry(g, generatedList));
}

function renderAnalysisEntry(entry, container) {
  const wrap = document.createElement('div');
  wrap.className = 'card';
  const heading = document.createElement('p');
  heading.className = 'video-title';
  heading.textContent = entry.title;
  wrap.appendChild(heading);

  const eager = entry.video_id === justAnalyzedVideoId;

  entry.candidates.forEach((c, i) => {
    const key = `${entry.video_id}-${i}`;
    state[key] = {
      video_id: entry.video_id, video_title: entry.title,
      candidate_title: c.title, reason: c.reason,
      start: c.start_seconds, end: c.end_seconds,
      crop_x_pct: 0.5, caption_margin_v: 90,
    };

    const div = document.createElement('div');
    div.className = 'candidate';
    div.innerHTML = `
      <div class="time">${formatTime(c.start_seconds)} - ${formatTime(c.end_seconds)}</div>
      <h3></h3>
      <p></p>
      <div class="preview-wrap"><img id="previewImg-${key}" alt="preview"></div>
      <p class="preview-hint" id="previewHint-${key}">${eager ? '' : 'Move a slider to load the preview'}</p>
      <div class="adjust">
        <label>Move left / right</label>
        <div class="slider-labels"><span>Left</span><span>Right</span></div>
        <input type="range" id="cropX-${key}" min="0" max="100" value="50" oninput="onSliderChange('${key}')">
        <label>Caption height</label>
        <div class="slider-labels"><span>Lower</span><span>Higher</span></div>
        <input type="range" id="capY-${key}" min="40" max="300" value="90" oninput="onSliderChange('${key}')">
      </div>
      <button onclick="generate('${key}')">Make this short</button>
      <div id="genStatus-${key}"></div>
    `;
    div.querySelector('h3').textContent = c.title;
    div.querySelector('p').textContent = c.reason;
    wrap.appendChild(div);
    if (eager) updatePreview(key);
  });

  container.appendChild(wrap);
}

function renderGeneratedEntry(g, container) {
  const div = document.createElement('div');
  div.className = 'card generated-card';
  div.innerHTML = `
    <h3></h3>
    <p class="meta"></p>
    <p class="meta"></p>
  `;
  const [titleEl, fromEl, whenEl] = div.querySelectorAll('h3, .meta');
  titleEl.textContent = g.candidate_title || 'Short';
  fromEl.textContent = `From "${g.source_title || g.video_id}" - ${formatTime(g.start)} to ${formatTime(g.end)}`;
  whenEl.textContent = g.generated_at ? `Made ${new Date(g.generated_at).toLocaleString()}` : '';

  const videoEl = document.createElement('video');
  videoEl.controls = true;
  videoEl.src = g.url;
  div.appendChild(videoEl);

  const link = document.createElement('a');
  link.className = 'download';
  link.href = g.url;
  link.download = g.filename;
  const dlBtn = document.createElement('button');
  dlBtn.className = 'secondary';
  dlBtn.textContent = 'Download';
  link.appendChild(dlBtn);
  div.appendChild(link);

  container.appendChild(div);
}

function onSliderChange(key) {
  const cropX = document.getElementById('cropX-' + key).value / 100;
  const capY = document.getElementById('capY-' + key).value;
  state[key].crop_x_pct = cropX;
  state[key].caption_margin_v = capY;

  clearTimeout(debounceTimers[key]);
  debounceTimers[key] = setTimeout(() => updatePreview(key), 300);
}

async function updatePreview(key) {
  const img = document.getElementById('previewImg-' + key);
  const s = state[key];
  img.style.opacity = '0.5';
  try {
    const res = await fetch('/api/preview', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({
        video_id: s.video_id, start: s.start, end: s.end,
        crop_x_pct: s.crop_x_pct, caption_margin_v: s.caption_margin_v
      })
    });
    const data = await res.json();
    if (data.url) {
      img.src = data.url + '?t=' + Date.now();
      img.style.opacity = '1';
      const hint = document.getElementById('previewHint-' + key);
      if (hint) hint.textContent = '';
    } else if (data.error) {
      img.style.opacity = '1';
    }
  } catch (e) {
    img.style.opacity = '1';
  }
}

async function generate(key) {
  const statusEl = document.getElementById('genStatus-' + key);
  const s = state[key];
  statusEl.innerHTML = '<p class="status"><span class="spinner"></span>Cutting, reframing to vertical, and adding captions...</p>';
  try {
    const res = await fetch('/api/generate', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({
        video_id: s.video_id, start: s.start, end: s.end,
        crop_x_pct: s.crop_x_pct, caption_margin_v: s.caption_margin_v,
        candidate_title: s.candidate_title, reason: s.reason
      })
    });
    const data = await res.json();
    if (data.error) {
      statusEl.innerHTML = '<p class="error">' + data.error + '</p>';
      return;
    }
    statusEl.innerHTML = '<p class="status">Done - see it under "Shorts you\'ve made" below.</p>';
    await loadHistory();
  } catch (e) {
    statusEl.innerHTML = '<p class="error">Something went wrong: ' + e + '</p>';
  }
}

refreshSettingsState();
loadHistory();
</script>
</body>
</html>
